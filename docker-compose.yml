services:
  db:
    image: postgres:16
    container_name: quantifyme-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: yuta
      POSTGRES_PASSWORD: changeme_local_dev
      POSTGRES_DB: quantifyme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
