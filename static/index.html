<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantifyMe Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #0f0f0f;
    color: #eee;
    margin: 0;
    padding: 20px;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 16px;
  }
  .card {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
    max-width: 576px;
    margin-left: auto;
    margin-right: auto;
  }
  .card h2 {
    font-size: 16px;
    margin: 0 0 12px 0;
    color: #aaa;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th, td {
    text-align: left;
    padding: 8px;
    border-bottom: 1px solid #333;
  }

  /* タブ */
  .tabs {
    display: flex;
    gap: 8px;
    max-width: 576px;
    margin: 0 auto 20px auto;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .tab-btn {
    background: #1a1a1a;
    color: #888;
    border: none;
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tab-btn.active {
    background: #4ade80;
    color: #052e16;
  }

  /* 今日のランキング */
  .rank-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #262626;
  }
  .rank-item:last-child { border-bottom: none; }
  .rank-medal {
    font-size: 20px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .rank-name {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
  }
  .rank-steps {
    font-size: 16px;
    font-weight: 700;
    color: #4ade80;
  }

  /* PC用カレンダー */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal-header button {
    background: #262626;
    color: #eee;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 14px;
    cursor: pointer;
  }
  .cal-title { font-size: 15px; font-weight: bold; }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-weekday { text-align: center; font-size: 11px; color: #888; padding-bottom: 4px; }
  .cal-cell {
    height: 64px;
    border-radius: 7px;
    background: #1e1e1e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #666;
    position: relative;
  }
  .cal-cell.empty { background: transparent; }
  .cal-cell .cal-day { font-size: 13px; margin-bottom: 2px; }
  .cal-cell .cal-steps { font-size: 11px; }
  .cal-cell[data-level="0"] { background: #1e1e1e; color: #555; }
  .cal-cell[data-level="1"] { background: #14532d; color: #d1fae5; }
  .cal-cell[data-level="2"] { background: #16a34a; color: #ecfdf5; }
  .cal-cell[data-level="3"] { background: #4ade80; color: #052e16; }
  .cal-cell.today { outline: 2px solid #60a5fa; }

  /* スマホ用リスト */
  .day-list-item {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #262626;
    gap: 12px;
  }
  .day-list-item:last-child { border-bottom: none; }
  .day-list-date { width: 64px; font-size: 13px; color: #aaa; flex-shrink: 0; }
  .day-list-date .dow { font-size: 11px; color: #666; }
  .day-list-bar-wrap {
    flex: 1;
    background: #262626;
    border-radius: 6px;
    height: 20px;
    overflow: hidden;
    position: relative;
  }
  .day-list-bar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #16a34a, #4ade80); }
  .day-list-steps { width: 68px; text-align: right; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .day-list-item.today .day-list-date { color: #60a5fa; font-weight: 700; }
  .day-list-item.achieved .day-list-steps { color: #4ade80; }

  .heatmap-legend { display: flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 12px; color: #888; }
  .heatmap-legend .cal-cell { width: 14px; height: 14px; }

  /* ゲーム風ランキング */
  .rank-game-item {
    background: #1e1e1e;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
    border: 2px solid transparent;
  }
  .rank-game-item.first {
    border-color: #facc15;
    box-shadow: 0 0 20px rgba(250, 204, 21, 0.4), inset 0 0 20px rgba(250, 204, 21, 0.05);
  }
  .rank-game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .rank-game-name {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
    font-weight: 700;
  }
  .rank-game-crown {
    font-size: 20px;
    filter: drop-shadow(0 0 6px rgba(250, 204, 21, 0.8));
    animation: crownFloat 2s ease-in-out infinite;
  }
  @keyframes crownFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  .rank-game-steps {
    font-size: 20px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .rank-game-item.first .rank-game-steps { color: #facc15; }
  .rank-game-item:not(.first) .rank-game-steps { color: #4ade80; }
  .rank-game-bar-wrap {
    background: #0f0f0f;
    border-radius: 999px;
    height: 14px;
    overflow: hidden;
    position: relative;
  }
  .rank-game-bar {
    height: 100%;
    border-radius: 999px;
    width: 0%;
    transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }
  .rank-game-item.first .rank-game-bar {
    background: linear-gradient(90deg, #facc15, #fde047);
    box-shadow: 0 0 10px rgba(250, 204, 21, 0.6);
  }
  .rank-game-item:not(.first) .rank-game-bar {
    background: linear-gradient(90deg, #16a34a, #4ade80);
  }
  .rank-game-bar::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .rank-diff {
    margin-top: 8px;
    font-size: 12px;
    color: #888;
    text-align: right;
  }
  .rank-diff.behind { color: #f87171; }

  /* ストリークカード */
  .streak-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1e1e1e;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .streak-card:last-child { margin-bottom: 0; }
  .streak-card .streak-dates { font-size: 13px; color: #ddd; }
  .streak-card .streak-dates .arrow { color: #666; margin: 0 6px; }
  .streak-card .streak-days {
    font-size: 15px;
    font-weight: 700;
    color: #4ade80;
    background: #14532d;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
</style>
</head>
<body>

<h1>📊 QuantifyMe Dashboard</h1>

<div class="tabs" id="tabs"></div>

<!-- 今日のランキング(全体タブでのみ表示) -->
<div class="card" id="rankingCard" style="display:none;">
  <h2>🏆 今日のランキング</h2>
  <div id="rankingList"></div>
</div>

<!-- 個人用セクション -->
<div id="personalSections">
  <div class="card">
    <h2>📈 歩数推移 & 7日移動平均</h2>
    <div style="position:relative; height:260px; width:100%;"><canvas id="stepsChart"></canvas></div>
  </div>

  <div class="card" id="pcCalendarCard">
    <h2>🔥 歩数カレンダー</h2>
    <div class="cal-header">
      <button id="prevMonth">← 前の月</button>
      <div class="cal-title" id="calTitle"></div>
      <button id="nextMonth">次の月 →</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="heatmap-legend">
      <span>少ない</span>
      <div class="cal-cell" data-level="0"></div>
      <div class="cal-cell" data-level="1"></div>
      <div class="cal-cell" data-level="2"></div>
      <div class="cal-cell" data-level="3"></div>
      <span>多い</span>
    </div>
  </div>

  <div class="card" id="mobileListCard" style="display:none;">
    <h2>🔥 直近14日間</h2>
    <div id="dayList"></div>
  </div>

  <div class="card">
    <h2>🔥 1万歩ストリーク</h2>
    <table id="streakTable" style="display:none;">
      <thead><tr><th>開始日</th><th>終了日</th><th>連続日数</th></tr></thead>
      <tbody></tbody>
    </table>
    <div id="streakCards"></div>
  </div>
</div>

<script>
const API_BASE = "";
const isMobile = window.innerWidth <= 600;
let allStepsData = {};
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let currentUser = "all";
let chartInstance = null;

async function fetchJSON(path) {
  const res = await fetch(API_BASE + path);
  return res.json();
}

function formatDateJST(y, m, d) {
  const mm = String(m + 1).padStart(2, "0");
  const dd = String(d).padStart(2, "0");
  return `${y}-${mm}-${dd}`;
}

function stepLevel(steps) {
  if (!steps || steps === 0) return 0;
  if (steps < 5000) return 1;
  if (steps < 10000) return 2;
  return 3;
}

// ===== タブ生成 =====
async function initTabs() {
  const users = await fetchJSON("/analytics/users");
  const tabsContainer = document.getElementById("tabs");
  tabsContainer.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.className = "tab-btn active";
  allBtn.textContent = "🏆 全体";
  allBtn.onclick = () => switchTab("all", allBtn);
  tabsContainer.appendChild(allBtn);

  users.forEach(u => {
    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.textContent = u;
    btn.onclick = () => switchTab(u, btn);
    tabsContainer.appendChild(btn);
  });
}

function switchTab(user, btnEl) {
  currentUser = user;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btnEl.classList.add("active");

  if (user === "all") {
    document.getElementById("rankingCard").style.display = "block";
    document.getElementById("personalSections").style.display = "none";
    renderRanking();
  } else {
    document.getElementById("rankingCard").style.display = "none";
    document.getElementById("personalSections").style.display = "block";
    loadPersonalData(user);
  }
}

// ===== 今日のランキング =====
function animateCount(el, target, duration) {
  const start = 0;
  const startTime = performance.now();
  function tick(now) {
    const progress = Math.min(1, (now - startTime) / duration);
    const eased = 1 - Math.pow(1 - progress, 3);
    const value = Math.floor(start + (target - start) * eased);
    el.textContent = value.toLocaleString() + " 歩";
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

async function renderRanking() {
  const data = await fetchJSON("/analytics/today-ranking");
  const container = document.getElementById("rankingList");
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = '<div style="color:#666;font-size:13px;">今日はまだ誰も記録してないよ</div>';
    return;
  }

  const topSteps = data[0].steps;

  data.forEach((row, i) => {
    const item = document.createElement("div");
    item.className = "rank-game-item" + (i === 0 ? " first" : "");
    const crown = i === 0 ? '<span class="rank-game-crown">👑</span>' : "";
    const pct = topSteps > 0 ? Math.max(4, (row.steps / topSteps) * 100) : 0;
    const diff = i === 0 ? "" :
      `<div class="rank-diff behind">1位まであと ${(topSteps - row.steps).toLocaleString()} 歩</div>`;

    item.innerHTML = `
      <div class="rank-game-header">
        <div class="rank-game-name">${crown}${row.user_name}</div>
        <div class="rank-game-steps" id="steps-${i}">0 歩</div>
      </div>
      <div class="rank-game-bar-wrap">
        <div class="rank-game-bar" id="bar-${i}"></div>
      </div>
      ${diff}
    `;
    container.appendChild(item);
  });

  // アニメーション開始(描画後に少し遅延させて発火)
  requestAnimationFrame(() => {
    setTimeout(() => {
      data.forEach((row, i) => {
        const pct = topSteps > 0 ? Math.max(4, (row.steps / topSteps) * 100) : 0;
        const barEl = document.getElementById(`bar-${i}`);
        const stepsEl = document.getElementById(`steps-${i}`);
        if (barEl) barEl.style.width = pct + "%";
        if (stepsEl) animateCount(stepsEl, row.steps, 1200);
      });
    }, 50);
  });
}

// ===== 個人データ読み込み =====
async function loadPersonalData(user) {
  await renderStepsChart(user);
  await loadStepsData(user);
  if (isMobile) {
    document.getElementById("pcCalendarCard").style.display = "none";
    document.getElementById("mobileListCard").style.display = "block";
    renderDayList();
  } else {
    document.getElementById("pcCalendarCard").style.display = "block";
    document.getElementById("mobileListCard").style.display = "none";
    renderCalendar();
  }
  await renderStreakTable(user);
}

async function renderStepsChart(user) {
  let data = await fetchJSON(`/analytics/7day-average?user_name=${encodeURIComponent(user)}`);
  if (isMobile) data = data.slice(-14);

  const labels = data.map(d => {
    if (!isMobile) return d.date;
    const parts = d.date.split("-");
    return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
  });
  const steps = data.map(d => d.steps);
  const avg = data.map(d => d.avg_7days);

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById("stepsChart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        { label: "歩数", data: steps, borderColor: "#4ade80", backgroundColor: "transparent", tension: 0.3, pointRadius: isMobile ? 3 : 2 },
        { label: "7日移動平均", data: avg, borderColor: "#60a5fa", backgroundColor: "transparent", borderDash: [5, 5], tension: 0.3, pointRadius: 0 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: "#eee", font: { size: 12 } } } },
      scales: {
        x: { ticks: { color: "#aaa", font: { size: 11 }, maxRotation: 0, minRotation: 0, autoSkip: true, maxTicksLimit: isMobile ? 7 : 20 } },
        y: { ticks: { color: "#aaa", font: { size: 11 } } }
      }
    }
  });
}

async function loadStepsData(user) {
  const data = await fetchJSON(`/health-log?user_name=${encodeURIComponent(user)}`);
  allStepsData = {};
  data.forEach(d => { allStepsData[d.date] = d.steps; });
}

function renderCalendar() {
  const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
  const grid = document.getElementById("calGrid");
  const title = document.getElementById("calTitle");
  title.textContent = `${currentYear}年 ${currentMonth + 1}月`;

  grid.innerHTML = "";
  weekdays.forEach(w => {
    const el = document.createElement("div");
    el.className = "cal-weekday";
    el.textContent = w;
    grid.appendChild(el);
  });

  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay = new Date(currentYear, currentMonth + 1, 0);
  const startWeekday = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  const todayStr = formatDateJST(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());

  for (let i = 0; i < startWeekday; i++) {
    const el = document.createElement("div");
    el.className = "cal-cell empty";
    grid.appendChild(el);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = formatDateJST(currentYear, currentMonth, day);
    const steps = allStepsData[dateStr] || 0;
    const level = stepLevel(steps);
    const cell = document.createElement("div");
    cell.className = "cal-cell";
    if (dateStr === todayStr) cell.classList.add("today");
    cell.setAttribute("data-level", level);
    cell.innerHTML = `<div class="cal-day">${day}</div>` +
      (steps > 0 ? `<div class="cal-steps">${(steps / 1000).toFixed(1)}k</div>` : "");
    grid.appendChild(cell);
  }
}

function renderDayList() {
  const container = document.getElementById("dayList");
  container.innerHTML = "";
  const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
  const todayStr = formatDateJST(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());

  const today = new Date();
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    days.push(d);
  }

  const maxSteps = Math.max(10000, ...days.map(d => allStepsData[formatDateJST(d.getFullYear(), d.getMonth(), d.getDate())] || 0));

  days.forEach(d => {
    const dateStr = formatDateJST(d.getFullYear(), d.getMonth(), d.getDate());
    const steps = allStepsData[dateStr] || 0;
    const pct = Math.min(100, (steps / maxSteps) * 100);

    const item = document.createElement("div");
    item.className = "day-list-item";
    if (dateStr === todayStr) item.classList.add("today");
    if (steps >= 10000) item.classList.add("achieved");

    const mm = d.getMonth() + 1;
    const dd = d.getDate();
    const dow = weekdays[d.getDay()];

    item.innerHTML = `
      <div class="day-list-date">${mm}/${dd}<div class="dow">${dow}</div></div>
      <div class="day-list-bar-wrap"><div class="day-list-bar" style="width:${pct}%"></div></div>
      <div class="day-list-steps">${steps > 0 ? steps.toLocaleString() : "-"}</div>
    `;
    container.appendChild(item);
  });
}

document.getElementById("prevMonth").addEventListener("click", () => {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
});

document.getElementById("nextMonth").addEventListener("click", () => {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
});

async function renderStreakTable(user) {
  const data = await fetchJSON(`/analytics/streaks?user_name=${encodeURIComponent(user)}`);

  if (isMobile) {
    const container = document.getElementById("streakCards");
    container.innerHTML = "";
    data.forEach(row => {
      const card = document.createElement("div");
      card.className = "streak-card";
      card.innerHTML = `
        <div class="streak-dates">${row.streak_start}<span class="arrow">→</span>${row.streak_end}</div>
        <div class="streak-days">${row.streak_length}日</div>
      `;
      container.appendChild(card);
    });
  } else {
    document.getElementById("streakTable").style.display = "table";
    const tbody = document.querySelector("#streakTable tbody");
    tbody.innerHTML = "";
    data.forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${row.streak_start}</td><td>${row.streak_end}</td><td>${row.streak_length}日</td>`;
      tbody.appendChild(tr);
    });
  }
}

// ===== 初期化: 全体タブ(ランキング)から開始 =====
async function init() {
  document.getElementById("personalSections").style.display = "none";
  await initTabs();
  await renderRanking();
}

init();
</script>

</body>
</html>
